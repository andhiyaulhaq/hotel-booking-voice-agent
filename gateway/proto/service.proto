syntax = "proto3";

package hotelagent;

// Provide go_package for go protoc compiler
option go_package = "github.com/hotel-voice-agent/gateway/proto";

service HotelStateService {
  rpc CheckAvailability (AvailabilityRequest) returns (AvailabilityResponse);
  rpc InitiateCheckout (CheckoutRequest) returns (CheckoutResponse);
}

message AvailabilityRequest {
  string room_type = 1;
}

message AvailabilityResponse {
  bool is_available = 1;
  int32 available_count = 2;
  string error_message = 3;
}

message CheckoutRequest {
  string guest_name = 1;
  string room_type = 2;
  int32 nights = 3;
}

message CheckoutResponse {
  string invoice_url = 1;
  string invoice_id = 2;
  string error_message = 3;
}
